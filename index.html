<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolist</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --primary:#667eea;--primary-dark:#5a67d8;--secondary:#764ba2;
            --success:#48bb78;--danger:#c53030;--warning:#ed8936;
            --text-dark:#2d3748;--text-medium:#4a5568;--text-light:#718096;
            --bg-light:#f7fafc;--bg-lighter:#edf2f7;--border:#e2e8f0;
            --border-dark:#cbd5e0;--white:#ffffff;
            --shadow:0 10px 30px rgba(0,0,0,0.2);--shadow-sm:0 2px 8px rgba(0,0,0,0.1)
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);min-height:100vh;padding:20px;line-height:1.6}
        .container{max-width:1400px;margin:0 auto;padding-bottom:80px}
        .header{text-align:center;margin-bottom:30px;color:var(--white)}
        .header h1{font-size:clamp(32px,5vw,48px);font-weight:300;margin-bottom:10px}
        .header p{font-size:clamp(14px,3vw,18px);opacity:.9}
        .controls{background:var(--white);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
        .view-selector{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
        .view-btn{padding:12px 20px;border:none;border-radius:10px;background:var(--bg-light);color:var(--text-dark);cursor:pointer;font-size:15px;font-weight:600;transition:all .3s ease}
        .view-btn:hover{background:var(--bg-lighter);transform:translateY(-2px)}
        .view-btn.active{background:var(--primary);color:var(--white)}
        .backup-container{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .backup-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--text-medium);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s ease}
        .backup-btn:hover{background:var(--bg-light);border-color:var(--primary);color:var(--primary)}
        .navigation{display:flex;justify-content:center;align-items:center;gap:15px;flex-wrap:wrap}
        .nav-btn{padding:10px 15px;border:none;border-radius:10px;background:var(--bg-light);cursor:pointer;font-size:24px;transition:all .3s ease;min-width:50px}
        .nav-btn:hover{background:var(--bg-lighter);transform:scale(1.1)}
        .current-date{font-size:clamp(16px,3vw,20px);font-weight:600;color:var(--text-dark);min-width:200px;text-align:center;padding:0 10px}
        .today-btn{padding:10px 24px;border:none;border-radius:10px;background:var(--primary);color:var(--white);cursor:pointer;font-weight:600;transition:all .3s ease}
        .today-btn:hover{background:var(--primary-dark);transform:translateY(-2px)}
        .main-content{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow);min-height:400px}
        /* Daily */
        .daily-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
        .daily-stats{background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--white);padding:20px;border-radius:12px;margin-bottom:20px;text-align:center}
        .daily-stats h3{font-size:16px;font-weight:500;margin-bottom:10px;opacity:.9}
        .daily-percentage{font-size:48px;font-weight:700;margin-bottom:5px}
        .daily-count{font-size:14px;opacity:.8}
        .category-section{background:var(--bg-light);border-radius:12px;margin-bottom:20px;overflow:hidden}
        .category-header{padding:15px 20px;color:var(--white);font-weight:600;font-size:18px;display:flex;justify-content:space-between;align-items:center}
        .category-percentage{font-size:14px;opacity:.9}
        .habit-list{padding:15px}
        .habit-row{display:flex;align-items:center;gap:15px;padding:15px;background:var(--white);border-radius:10px;margin-bottom:10px;transition:all .2s ease}
        .habit-row:hover{transform:translateX(5px);box-shadow:var(--shadow-sm)}
        .habit-checkbox{width:36px;height:36px;min-width:36px;border:3px solid var(--border-dark);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease}
        .habit-checkbox.checked{background:var(--success);border-color:var(--success)}
        .habit-checkbox.checked::after{content:'✓';color:var(--white);font-weight:bold;font-size:20px}
        .habit-emoji{font-size:32px;line-height:1}
        .habit-info{flex:1}
        .habit-title{font-weight:600;color:var(--text-dark);font-size:16px}
        .habit-streak{display:inline-block;background:#fed7d7;color:var(--danger);padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;margin-top:5px}
        /* Counter */
        .counter-section{display:flex;flex-direction:column;gap:6px;flex:1}
        .counter-bar-wrap{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
        .counter-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .3s ease}
        .counter-label{font-size:12px;color:var(--text-light);font-weight:600}
        .counter-buttons{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
        .counter-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s ease}
        .counter-btn:hover{background:var(--primary);color:var(--white);border-color:var(--primary)}
        .counter-minus{padding:5px 10px;border:1px solid #fed7d7;border-radius:6px;background:var(--white);cursor:pointer;font-size:12px;font-weight:600;color:var(--danger);transition:all .2s ease}
        .counter-minus:hover{background:#fed7d7}
        /* Note */
        .note-box{background:var(--bg-light);border-radius:12px;padding:20px;height:fit-content}
        .note-box h3{margin-bottom:15px;color:var(--text-dark)}
        .note-textarea{width:100%;min-height:200px;padding:15px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;resize:vertical}
        .note-textarea:focus{outline:none;border-color:var(--primary)}
        .save-btn{margin-top:10px;width:100%;padding:12px;border:none;border-radius:10px;background:var(--primary);color:var(--white);font-weight:600;cursor:pointer;transition:all .2s ease}
        .save-btn:hover{background:var(--primary-dark)}
        /* Weekly */
        .weekly-container{overflow-x:auto}
        .weekly-grid{display:grid;grid-template-columns:200px repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);min-width:900px}
        .weekly-header{background:var(--text-dark);color:var(--white);padding:15px 10px;text-align:center;font-weight:600;font-size:14px}
        .weekly-habit-name{background:var(--bg-light);padding:15px;font-weight:600;color:var(--text-dark);display:flex;align-items:center;gap:10px}
        .weekly-cell{background:var(--white);padding:15px;min-height:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease}
        .weekly-cell:hover{background:var(--bg-light)}
        .weekly-checkbox{width:32px;height:32px;border:2px solid var(--border-dark);border-radius:6px;display:flex;align-items:center;justify-content:center}
        .weekly-checkbox.checked{background:var(--success);border-color:var(--success)}
        .weekly-checkbox.checked::after{content:'✓';color:var(--white);font-weight:bold;font-size:18px}
        .weekly-stats{background:var(--bg-light);padding:20px;border-radius:12px;margin-bottom:20px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:15px}
        .weekly-stat-item{text-align:center}
        .weekly-stat-label{font-size:12px;color:var(--text-light);margin-bottom:5px}
        .weekly-stat-value{font-size:28px;font-weight:700;color:var(--text-dark)}
        /* Monthly */
        .calendar{overflow-x:auto}
        .calendar-stats{background:var(--bg-light);padding:20px;border-radius:12px;margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
        .calendar-stat-box{text-align:center;padding:15px;background:var(--white);border-radius:10px}
        .calendar-stat-label{font-size:12px;color:var(--text-light);margin-bottom:8px}
        .calendar-stat-value{font-size:32px;font-weight:700;color:var(--text-dark)}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--border);border:2px solid var(--border);min-width:700px}
        .calendar-header{background:var(--text-dark);color:var(--white);padding:15px;text-align:center;font-weight:600}
        .calendar-cell{background:var(--white);padding:10px;min-height:150px;position:relative}
        .calendar-cell.other-month{background:var(--bg-light);opacity:.5}
        .cell-date{font-weight:700;color:var(--text-dark);margin-bottom:5px}
        .cell-percentage{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:8px}
        .cell-note{font-size:11px;color:var(--text-light);font-style:italic;margin-bottom:8px;max-height:30px;overflow:hidden}
        .cell-habits{display:grid;grid-template-columns:repeat(auto-fill,minmax(28px,1fr));gap:3px}
        .mini-habit{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:all .2s ease}
        .mini-habit.done{background:var(--success)}
        .mini-habit.undone{background:var(--border);opacity:.6}
        .mini-habit:hover{transform:scale(1.15)}
        /* Stats/Yearly */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
        .stat-card{background:var(--bg-light);border-radius:12px;padding:20px}
        .stat-card-header{display:flex;align-items:center;gap:12px;margin-bottom:15px}
        .stat-emoji{font-size:32px}
        .stat-name{font-weight:600;color:var(--text-dark);font-size:18px;flex:1}
        .progress-bar{width:100%;height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:10px}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:width .5s ease}
        .progress-label{font-size:14px;color:var(--text-light);margin-bottom:15px}
        .months-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:10px}
        .month-box{background:var(--white);padding:12px 8px;border-radius:8px;text-align:center}
        .month-name{font-size:11px;color:var(--text-light);margin-bottom:5px}
        .month-percent{font-size:20px;font-weight:700;color:var(--text-dark)}
        .yearly-title{font-size:28px;font-weight:600;color:var(--text-dark);margin-bottom:30px;text-align:center}
        /* FAB & Modal */
        .fab{position:fixed;bottom:30px;right:30px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));color:var(--white);border:none;font-size:32px;cursor:pointer;box-shadow:var(--shadow);transition:all .3s ease;display:flex;align-items:center;justify-content:center;z-index:999}
        .fab:hover{transform:scale(1.1) rotate(90deg)}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);justify-content:center;align-items:center;z-index:1000;padding:20px}
        .modal.show{display:flex}
        .modal-box{background:var(--white);border-radius:16px;padding:30px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
        .modal-title{font-size:24px;font-weight:600;margin-bottom:20px;color:var(--text-dark)}
        .form-field{margin-bottom:20px}
        .form-field label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-medium)}
        .form-field input,.form-field select{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit}
        .form-field input:focus,.form-field select:focus{outline:none;border-color:var(--primary)}
        .counter-toggle{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-light);border-radius:10px;cursor:pointer;margin-bottom:20px}
        .counter-toggle input[type=checkbox]{width:20px;height:20px;cursor:pointer}
        .counter-toggle label{font-weight:600;color:var(--text-medium);cursor:pointer;font-size:15px}
        .counter-fields{background:var(--bg-lighter);border-radius:10px;padding:15px;margin-bottom:20px}
        .counter-fields.hidden{display:none}
        .modal-buttons{display:flex;gap:10px;margin-top:30px}
        .modal-btn{flex:1;padding:14px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all .2s ease;font-size:16px}
        .btn-primary{background:var(--primary);color:var(--white)}
        .btn-primary:hover{background:var(--primary-dark)}
        .btn-secondary{background:var(--border);color:var(--text-medium)}
        .btn-secondary:hover{background:var(--border-dark)}
        .delete-btn{width:100%;margin-top:10px;padding:12px;border:2px solid #fed7d7;border-radius:10px;background:var(--white);color:var(--danger);font-weight:600;cursor:pointer;transition:all .2s ease}
        .delete-btn:hover{background:#fed7d7}
        @media(max-width:768px){body{padding:10px}.daily-grid{grid-template-columns:1fr}.calendar-grid{min-width:600px}.months-grid{grid-template-columns:repeat(3,1fr)}.weekly-grid{grid-template-columns:150px repeat(7,1fr)}}
        .hidden{display:none}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎯 EVOLIST</h1>
        <p>Evoluciona un hábito a la vez</p>
    </div>
    <div class="controls">
        <div class="view-selector">
            <button class="view-btn active" onclick="app.switchView('daily',this)">📅 Diario</button>
            <button class="view-btn" onclick="app.switchView('weekly',this)">📊 Semanal</button>
            <button class="view-btn" onclick="app.switchView('monthly',this)">📆 Mensual</button>
            <button class="view-btn" onclick="app.switchView('yearly',this)">📈 Anual</button>
            <button class="view-btn" onclick="app.switchView('stats',this)">📉 Estadísticas</button>
        </div>
        <div class="backup-container">
            <button class="backup-btn" onclick="app.exportData()">📥 Exportar</button>
            <button class="backup-btn" onclick="document.getElementById('importInput').click()">📤 Importar</button>
            <button class="backup-btn" id="syncBtn" onclick="handleSync()" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-weight:600">🔄 Sincronizar</button>
            <span id="authStatus" style="font-size:12px;color:#666;margin-left:10px"></span>
            <input type="file" id="importInput" class="hidden" accept=".json" onchange="app.importData(event)">
        </div>
        <div class="navigation">
            <button class="nav-btn" onclick="app.navigate(-1)">←</button>
            <div class="current-date" id="dateDisplay"></div>
            <button class="nav-btn" onclick="app.navigate(1)">→</button>
            <button class="today-btn" onclick="app.goToday()">Hoy</button>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<button class="fab" onclick="app.openModal()">+</button>

<div class="modal" id="habitModal">
    <div class="modal-box">
        <h2 class="modal-title" id="modalTitle">Agregar Hábito</h2>
        <div class="form-field">
            <label for="habitName">Nombre del Hábito</label>
            <input type="text" id="habitName" placeholder="ej. Meditar 10 minutos" maxlength="50">
        </div>
        <div class="form-field">
            <label for="habitIcon">Icono (emoji)</label>
            <input type="text" id="habitIcon" placeholder="🧘" maxlength="2">
        </div>
        <div class="form-field">
            <label for="habitCategory">Categoría</label>
            <select id="habitCategory">
                <option value="health">Salud</option>
                <option value="work">Trabajo</option>
                <option value="learning">Aprendizaje</option>
                <option value="creative">Creatividad</option>
                <option value="personal">Personal</option>
                <option value="fitness">Ejercicio</option>
            </select>
        </div>
        <div class="counter-toggle">
            <input type="checkbox" id="isCounter" onchange="app.toggleCounterFields()">
            <label for="isCounter">🔢 Hábito con contador (ej: vasos de agua, dominadas)</label>
        </div>
        <div class="counter-fields hidden" id="counterFields">
            <div class="form-field">
                <label for="counterGoal">Meta diaria</label>
                <input type="number" id="counterGoal" placeholder="ej. 10" min="1" max="9999">
            </div>
            <div class="form-field">
                <label for="counterUnit">Unidad</label>
                <input type="text" id="counterUnit" placeholder="ej. repeticiones, litros, páginas" maxlength="20">
            </div>
            <div class="form-field">
                <label for="counterButtons">Botones rápidos (separados por coma)</label>
                <input type="text" id="counterButtons" placeholder="ej. 1,5,10" maxlength="30">
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn btn-secondary" onclick="app.closeModal()">Cancelar</button>
            <button class="modal-btn btn-primary" onclick="app.saveHabit()">Guardar</button>
        </div>
        <button class="delete-btn hidden" id="deleteBtn" onclick="app.deleteHabit()">🗑️ Eliminar Hábito</button>
    </div>
</div>

<script>
'use strict';
const app = (() => {
    const CFG = {
        STORAGE_KEY:'habitTrackerData_v3',
        CATEGORY_COLORS:{health:'#48bb78',work:'#4299e1',learning:'#9f7aea',creative:'#ed8936',personal:'#ecc94b',fitness:'#f56565'},
        CATEGORY_NAMES:{health:'Salud',work:'Trabajo',learning:'Aprendizaje',creative:'Creatividad',personal:'Personal',fitness:'Ejercicio'}
    };

    let S = {
        habits:[
            {id:1,name:'Tratamiento cara',icon:'😊',category:'health',isCounter:false},
            {id:2,name:'Rosetta',icon:'🗣️',category:'learning',isCounter:false},
            {id:3,name:'Music',icon:'🎵',category:'creative',isCounter:false},
            {id:4,name:'Act. física',icon:'🏃',category:'fitness',isCounter:false},
            {id:5,name:'Meditar',icon:'🧘',category:'health',isCounter:false},
            {id:6,name:'Estudiar cripto',icon:'💰',category:'learning',isCounter:false},
            {id:7,name:'Estudiar marketing',icon:'📊',category:'work',isCounter:false},
            {id:8,name:'Journaling',icon:'✍️',category:'personal',isCounter:false},
            {id:9,name:'Reading',icon:'📚',category:'learning',isCounter:false},
            {id:10,name:'Checking emails',icon:'📧',category:'work',isCounter:false},
            {id:11,name:'My website',icon:'💻',category:'work',isCounter:false},
            {id:12,name:'Violín',icon:'🎻',category:'creative',isCounter:false},
            {id:13,name:'10 Dominadas',icon:'💪',category:'fitness',isCounter:true,goal:10,unit:'repeticiones',quickBtns:[1,5,10]},
            {id:14,name:'2 lts Agua',icon:'💧',category:'health',isCounter:true,goal:2,unit:'litros',quickBtns:[0.25,0.5,1]},
            {id:15,name:'Planear mañana',icon:'📅',category:'personal',isCounter:false}
        ],
        completions:{},
        counters:{},
        notes:{},
        currentView:'daily',
        currentDate:new Date(),
        editingId:null
    };

    const esc = t => {const d=document.createElement('div');d.textContent=t;return d.innerHTML};
    const dateKey = d => {try{return d.toISOString().split('T')[0]}catch(e){return null}};
    const fmtDate = (d,o={weekday:'long',year:'numeric',month:'long',day:'numeric'}) => {try{return d.toLocaleDateString('es-ES',o)}catch(e){return ''}};
    const weekStart = d => {const w=new Date(d);w.setDate(w.getDate()-w.getDay());return w};
    const weekDates = d => {const s=weekStart(d);return Array.from({length:7},(_,i)=>{const x=new Date(s);x.setDate(s.getDate()+i);return x})};

    const save = () => {
        try{localStorage.setItem(CFG.STORAGE_KEY,JSON.stringify({habits:S.habits,completions:S.completions,counters:S.counters,notes:S.notes,version:3,lastSaved:new Date().toISOString()}))}
        catch(e){console.error(e)}
    };
    const load = () => {
        try{
            const d=localStorage.getItem(CFG.STORAGE_KEY);
            if(d){
                const p=JSON.parse(d);
                if(p.habits&&Array.isArray(p.habits))S.habits=p.habits;
                if(p.completions)S.completions=p.completions;
                if(p.counters)S.counters=p.counters;
                if(p.notes)S.notes=p.notes;
            }
        }catch(e){console.error(e)}
    };

    const getStreak = id => {
        let streak=0,d=new Date();d.setHours(0,0,0,0);
        while(streak<365){if(S.completions[`${id}-${dateKey(d)}`]){streak++;d.setDate(d.getDate()-1)}else break}
        return streak;
    };
    const getDailyPct = d => {
        if(!S.habits.length)return 0;
        const done=S.habits.filter(h=>S.completions[`${h.id}-${dateKey(d)}`]).length;
        return Math.round(done/S.habits.length*100);
    };
    const getCatPct = (cat,d) => {
        const ch=S.habits.filter(h=>h.category===cat);
        if(!ch.length)return 0;
        return Math.round(ch.filter(h=>S.completions[`${h.id}-${dateKey(d)}`]).length/ch.length*100);
    };
    const getRate = (id,s,e) => {
        let total=0,done=0,cur=new Date(s);const end=new Date(e);
        while(cur<=end&&total<366){total++;if(S.completions[`${id}-${dateKey(cur)}`])done++;cur.setDate(cur.getDate()+1)}
        return total>0?Math.round(done/total*100):0;
    };
    const groupByCat = () => {
        const g={};S.habits.forEach(h=>{if(!g[h.category])g[h.category]=[];g[h.category].push(h)});return g;
    };

    const toggleHabit = (id,date) => {
        const k=`${id}-${dateKey(date)}`;
        S.completions[k]=!S.completions[k];
        save();render();
    };
    const addCounter = (id,amt,date) => {
        const k=`${id}-${dateKey(date)}`;
        S.counters[k]=(S.counters[k]||0)+amt;
        const h=S.habits.find(x=>x.id===id);
        if(h&&h.isCounter&&h.goal){
            S.completions[k]=S.counters[k]>=h.goal;
        }
        save();render();
    };
    const subCounter = (id,date) => {
        const k=`${id}-${dateKey(date)}`;
        const h=S.habits.find(x=>x.id===id);
        const step=h&&h.quickBtns&&h.quickBtns.length?h.quickBtns[0]:1;
        S.counters[k]=Math.max(0,(S.counters[k]||0)-step);
        if(h&&h.isCounter&&h.goal){S.completions[k]=S.counters[k]>=h.goal}
        save();render();
    };

    const renderDaily = () => {
        const dk=dateKey(S.currentDate),grp=groupByCat();
        const pct=getDailyPct(S.currentDate),total=S.habits.length;
        const done=S.habits.filter(h=>S.completions[`${h.id}-${dk}`]).length;
        let html=`<div class="daily-stats"><h3>Progreso del Día</h3><div class="daily-percentage">${pct}%</div><div class="daily-count">${done} de ${total} hábitos completados</div></div><div class="daily-grid"><div>`;
        Object.keys(grp).forEach(cat=>{
            const col=CFG.CATEGORY_COLORS[cat]||'#718096',nm=CFG.CATEGORY_NAMES[cat]||cat,cp=getCatPct(cat,S.currentDate);
            html+=`<div class="category-section"><div class="category-header" style="background:${col}"><span>${nm}</span><span class="category-percentage">${cp}%</span></div><div class="habit-list">`;
            grp[cat].forEach(h=>{
                const k=`${h.id}-${dk}`,chk=S.completions[k],streak=getStreak(h.id);
                if(h.isCounter&&h.goal){
                    const val=S.counters[k]||0,pct2=Math.min(100,Math.round(val/h.goal*100));
                    const btns=(h.quickBtns||[1]).map(b=>`<button class="counter-btn" onclick="app.addCounter(${h.id},${b},'${dk}')">+${b}</button>`).join('');
                    html+=`<div class="habit-row">
                        <div class="habit-checkbox ${chk?'checked':''}" onclick="app.toggleHabit(${h.id})"></div>
                        <div class="habit-emoji" style="cursor:pointer" onclick="app.openModal(${h.id})">${h.icon}</div>
                        <div class="counter-section">
                            <div class="habit-title" style="cursor:pointer" onclick="app.openModal(${h.id})">${esc(h.name)}</div>
                            <div class="counter-label">${val} / ${h.goal} ${esc(h.unit||'')}</div>
                            <div class="counter-bar-wrap"><div class="counter-bar-fill" style="width:${pct2}%"></div></div>
                            <div class="counter-buttons">${btns}<button class="counter-minus" onclick="app.subCounter(${h.id},'${dk}')">−</button></div>
                            ${streak>0?`<span class="habit-streak">🔥 ${streak} días</span>`:''}
                        </div>
                    </div>`;
                } else {
                    html+=`<div class="habit-row">
                        <div class="habit-checkbox ${chk?'checked':''}" onclick="app.toggleHabit(${h.id})"></div>
                        <div style="flex:1;display:flex;align-items:center;gap:15px;cursor:pointer" onclick="app.openModal(${h.id})">
                            <div class="habit-emoji">${h.icon}</div>
                            <div class="habit-info">
                                <div class="habit-title">${esc(h.name)}</div>
                                ${streak>0?`<span class="habit-streak">🔥 ${streak} días</span>`:''}
                            </div>
                        </div>
                    </div>`;
                }
            });
            html+='</div></div>';
        });
        const note=S.notes[dk]||'';
        html+=`</div><div class="note-box"><h3>Nota del Día</h3><textarea class="note-textarea" id="noteText" maxlength="500" placeholder="¿Cómo estuvo tu día?">${esc(note)}</textarea><button class="save-btn" onclick="app.saveNote()">Guardar Nota</button></div></div>`;
        return html;
    };

    const renderWeekly = () => {
        const wd=weekDates(S.currentDate);
        let tot=S.habits.length*7,done=0;
        wd.forEach(d=>S.habits.forEach(h=>{if(S.completions[`${h.id}-${dateKey(d)}`])done++}));
        const pct=tot>0?Math.round(done/tot*100):0;
        let html=`<div class="weekly-stats"><div class="weekly-stat-item"><div class="weekly-stat-label">Progreso Semanal</div><div class="weekly-stat-value">${pct}%</div></div><div class="weekly-stat-item"><div class="weekly-stat-label">Completados</div><div class="weekly-stat-value">${done}/${tot}</div></div><div class="weekly-stat-item"><div class="weekly-stat-label">Hábitos</div><div class="weekly-stat-value">${S.habits.length}</div></div></div><div class="weekly-container"><div class="weekly-grid"><div class="weekly-header">Hábito</div>`;
        wd.forEach(d=>{html+=`<div class="weekly-header"><div>${d.toLocaleDateString('es-ES',{weekday:'short'})}</div><div style="font-size:18px;margin-top:5px">${d.getDate()}</div></div>`});
        S.habits.forEach(h=>{
            html+=`<div class="weekly-habit-name"><span>${h.icon}</span><span>${esc(h.name)}</span></div>`;
            wd.forEach(d=>{
                const k=`${h.id}-${dateKey(d)}`,chk=S.completions[k];
                html+=`<div class="weekly-cell" onclick="app.toggleHabitOnDate('${dateKey(d)}',${h.id})"><div class="weekly-checkbox ${chk?'checked':''}"></div></div>`;
            });
        });
        html+='</div></div>';return html;
    };

    const renderMonthly = () => {
        const yr=S.currentDate.getFullYear(),mo=S.currentDate.getMonth();
        const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
        let totP=0,totD=0,cur=new Date(first);
        while(cur<=last){S.habits.forEach(h=>{totP++;if(S.completions[`${h.id}-${dateKey(cur)}`])totD++});cur.setDate(cur.getDate()+1)}
        const mpct=totP>0?Math.round(totD/totP*100):0;
        let html=`<div class="calendar-stats"><div class="calendar-stat-box"><div class="calendar-stat-label">Progreso del Mes</div><div class="calendar-stat-value">${mpct}%</div></div><div class="calendar-stat-box"><div class="calendar-stat-label">Completados</div><div class="calendar-stat-value">${totD}</div></div><div class="calendar-stat-box"><div class="calendar-stat-label">Total Posible</div><div class="calendar-stat-value">${totP}</div></div></div><div class="calendar"><div class="calendar-grid">`;
        ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].forEach(d=>{html+=`<div class="calendar-header">${d}</div>`});
        let start=new Date(first);start.setDate(start.getDate()-start.getDay());
        for(let i=0;i<42;i++){
            const ic=start.getMonth()===mo,dk=dateKey(start),note=S.notes[dk]||'',dp=getDailyPct(start);
            html+=`<div class="calendar-cell ${!ic?'other-month':''}"><div class="cell-date">${start.getDate()}</div>`;
            if(ic){
                html+=`<div class="cell-percentage">${dp}% completado</div>`;
                if(note)html+=`<div class="cell-note">${esc(note)}</div>`;
                html+='<div class="cell-habits">';
                S.habits.forEach(h=>{
                    const done2=S.completions[`${h.id}-${dk}`];
                    html+=`<div class="mini-habit ${done2?'done':'undone'}" onclick="app.toggleHabitOnDate('${dk}',${h.id})" title="${esc(h.name)}">${h.icon}</div>`;
                });
                html+='</div>';
            }
            html+='</div>';start.setDate(start.getDate()+1);
        }
        html+='</div></div>';return html;
    };

    const renderYearly = () => {
        const yr=S.currentDate.getFullYear();
        let html=`<h2 class="yearly-title">Resumen Anual ${yr}</h2><div class="stats-grid">`;
        S.habits.forEach(h=>{
            html+=`<div class="stat-card"><div class="stat-card-header"><div class="stat-emoji">${h.icon}</div><div class="stat-name">${esc(h.name)}</div></div><div class="months-grid">`;
            for(let m=0;m<12;m++){
                const ms=new Date(yr,m,1),me=new Date(yr,m+1,0),r=getRate(h.id,ms,me),mn=ms.toLocaleDateString('es-ES',{month:'short'});
                html+=`<div class="month-box"><div class="month-name">${mn}</div><div class="month-percent">${r}%</div></div>`;
            }
            html+='</div></div>';
        });
        html+='</div>';return html;
    };

    const renderStats = () => {
        const ms=new Date(S.currentDate.getFullYear(),S.currentDate.getMonth(),1),me=new Date(S.currentDate.getFullYear(),S.currentDate.getMonth()+1,0);
        let html='<div class="stats-grid">';
        S.habits.forEach(h=>{
            const mr=getRate(h.id,ms,me);
            html+=`<div class="stat-card"><div class="stat-card-header"><div class="stat-emoji">${h.icon}</div><div class="stat-name">${esc(h.name)}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${mr}%"></div></div><div class="progress-label">Este mes: ${mr}%</div><div class="months-grid">`;
            for(let m=0;m<12;m++){
                const s2=new Date(S.currentDate.getFullYear(),m,1),e2=new Date(S.currentDate.getFullYear(),m+1,0),r=getRate(h.id,s2,e2),mn=s2.toLocaleDateString('es-ES',{month:'short'});
                html+=`<div class="month-box"><div class="month-name">${mn}</div><div class="month-percent">${r}%</div></div>`;
            }
            html+='</div></div>';
        });
        html+='</div>';return html;
    };

    const render = () => {
        const el=document.getElementById('mainContent'),dd=document.getElementById('dateDisplay');
        if(!el||!dd)return;
        let html='',dt='';
        const wd=weekDates(S.currentDate);
        switch(S.currentView){
            case'daily':html=renderDaily();dt=fmtDate(S.currentDate);break;
            case'weekly':html=renderWeekly();dt=`${wd[0].getDate()} - ${wd[6].getDate()} ${fmtDate(wd[6],{month:'long',year:'numeric'})}`;break;
            case'monthly':html=renderMonthly();dt=fmtDate(S.currentDate,{month:'long',year:'numeric'});break;
            case'yearly':html=renderYearly();dt=S.currentDate.getFullYear().toString();break;
            case'stats':html=renderStats();dt=fmtDate(S.currentDate,{month:'long',year:'numeric'});break;
        }
        dd.textContent=dt;el.innerHTML=html;
    };

    return {
        init(){load();render();document.getElementById('habitModal').addEventListener('click',e=>{if(e.target===document.getElementById('habitModal'))this.closeModal()})},
        switchView(v,btn){S.currentView=v;document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');render()},
        navigate(d){
            const n=parseInt(d);
            if(S.currentView==='daily')S.currentDate.setDate(S.currentDate.getDate()+n);
            else if(S.currentView==='weekly')S.currentDate.setDate(S.currentDate.getDate()+n*7);
            else if(S.currentView==='monthly'||S.currentView==='stats')S.currentDate.setMonth(S.currentDate.getMonth()+n);
            else if(S.currentView==='yearly')S.currentDate.setFullYear(S.currentDate.getFullYear()+n);
            render();
        },
        goToday(){S.currentDate=new Date();render()},
        toggleHabit(id,dateStr){
            const d=dateStr?new Date(dateStr.split('-')[0],dateStr.split('-')[1]-1,dateStr.split('-')[2]):S.currentDate;
            toggleHabit(id,d);
        },
        toggleHabitOnDate(ds,id){const [y,m,d]=ds.split('-');toggleHabit(id,new Date(y,m-1,d))},
        addCounter(id,amt,dk){const [y,m,d]=dk.split('-');addCounter(id,amt,new Date(y,m-1,d))},
        subCounter(id,dk){const [y,m,d]=dk.split('-');subCounter(id,new Date(y,m-1,d))},
        saveNote(){
            const t=document.getElementById('noteText');if(!t)return;
            const k=dateKey(S.currentDate),v=t.value.trim();
            if(v)S.notes[k]=v.substring(0,500);else delete S.notes[k];
            save();alert('Nota guardada ✅');
        },
        toggleCounterFields(){
            const cf=document.getElementById('counterFields'),ic=document.getElementById('isCounter');
            cf.classList.toggle('hidden',!ic.checked);
        },
        openModal(id=null){
            const modal=document.getElementById('habitModal'),title=document.getElementById('modalTitle'),del=document.getElementById('deleteBtn');
            S.editingId=id;
            if(id){
                const h=S.habits.find(x=>x.id===id);
                if(h){
                    title.textContent='Editar Hábito';
                    document.getElementById('habitName').value=h.name;
                    document.getElementById('habitIcon').value=h.icon;
                    document.getElementById('habitCategory').value=h.category;
                    document.getElementById('isCounter').checked=!!h.isCounter;
                    document.getElementById('counterGoal').value=h.goal||'';
                    document.getElementById('counterUnit').value=h.unit||'';
                    document.getElementById('counterButtons').value=(h.quickBtns||[]).join(',');
                    document.getElementById('counterFields').classList.toggle('hidden',!h.isCounter);
                    del.classList.remove('hidden');
                }
            } else {
                title.textContent='Agregar Hábito';
                document.getElementById('habitName').value='';
                document.getElementById('habitIcon').value='';
                document.getElementById('habitCategory').value='health';
                document.getElementById('isCounter').checked=false;
                document.getElementById('counterGoal').value='';
                document.getElementById('counterUnit').value='';
                document.getElementById('counterButtons').value='';
                document.getElementById('counterFields').classList.add('hidden');
                del.classList.add('hidden');
            }
            modal.classList.add('show');
            document.getElementById('habitName').focus();
        },
        closeModal(){document.getElementById('habitModal').classList.remove('show');S.editingId=null},
        saveHabit(){
            const name=document.getElementById('habitName').value.trim();
            if(!name){alert('Por favor ingresa un nombre');return}
            const icon=document.getElementById('habitIcon').value.trim()||'📌';
            const cat=document.getElementById('habitCategory').value;
            const isCounter=document.getElementById('isCounter').checked;
            const goal=isCounter?parseFloat(document.getElementById('counterGoal').value)||0:null;
            const unit=isCounter?document.getElementById('counterUnit').value.trim():'';
            const btnsRaw=document.getElementById('counterButtons').value;
            const quickBtns=isCounter?btnsRaw.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x)&&x>0):[];
            if(S.editingId){
                const i=S.habits.findIndex(h=>h.id===S.editingId);
                if(i!==-1)S.habits[i]={...S.habits[i],name,icon,category:cat,isCounter,goal,unit,quickBtns};
            } else {
                S.habits.push({id:Date.now(),name,icon,category:cat,isCounter,goal,unit,quickBtns});
            }
            save();this.closeModal();render();
        },
        deleteHabit(){
            if(!confirm('¿Eliminar este hábito? No se puede deshacer.'))return;
            S.habits=S.habits.filter(h=>h.id!==S.editingId);
            Object.keys(S.completions).forEach(k=>{if(k.startsWith(S.editingId+'-'))delete S.completions[k]});
            Object.keys(S.counters).forEach(k=>{if(k.startsWith(S.editingId+'-'))delete S.counters[k]});
            save();this.closeModal();render();
        },
        exportData(){
            try{
                const blob=new Blob([JSON.stringify({habits:S.habits,completions:S.completions,counters:S.counters,notes:S.notes,version:3,exportDate:new Date().toISOString()},null,2)],{type:'application/json'});
                const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`evolist-backup-${new Date().toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);
            }catch(e){alert('Error al exportar')}
        },
        importData(ev){
            const f=ev.target.files[0];if(!f)return;
            const r=new FileReader();
            r.onload=e=>{
                try{
                    const d=JSON.parse(e.target.result);
                    if(!d.habits||!Array.isArray(d.habits))throw new Error('Formato inválido');
                    if(!confirm('¿Importar datos? Sobrescribirá los actuales.'))return;
                    S.habits=d.habits;S.completions=d.completions||{};S.counters=d.counters||{};S.notes=d.notes||{};
                    save();render();alert('Datos importados ✅');
                }catch(e){alert('Error al importar')}
            };
            r.readAsText(f);ev.target.value='';
        }
    };
})();

document.readyState==='loading'?document.addEventListener('DOMContentLoaded',()=>app.init()):app.init();
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

// 🔒 REEMPLAZA CON TU CONFIGURACIÓN REAL DE FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyAHVeO8eQ9REcMibZbQkkQJwCiKWr0i8pc",
    authDomain: "evolist-f12dd.firebaseapp.com",
    databaseURL: "https://evolist-f12dd-default-rtdb.firebaseio.com",
    projectId: "evolist-f12dd",
    storageBucket: "evolist-f12dd.firebasestorage.app",
    messagingSenderId: "874381505458",
    appId: "1:874381505458:web:560bc5fff6aa7deff42aab"
};

const fbApp = initializeApp(firebaseConfig);
const database = getDatabase(fbApp);
const auth = getAuth(fbApp);
const AUTHORIZED_EMAIL = 'izipopar14@gmail.com';
let currentUser = null;

if (isSignInWithEmailLink(auth, window.location.href)) {
    let email = window.localStorage.getItem('emailForSignIn');
    if (!email) email = window.prompt('Confirma tu email');
    signInWithEmailLink(auth, email, window.location.href)
        .then(r => {
            window.localStorage.removeItem('emailForSignIn');
            window.history.replaceState({}, document.title, window.location.pathname);
            updateStatus(r.user);
            alert('✅ Autenticación exitosa');
        })
        .catch(e => alert('Error: ' + e.message));
}

onAuthStateChanged(auth, u => { currentUser = u; updateStatus(u); });

function updateStatus(u) {
    const s = document.getElementById('authStatus');
    if (u) { s.textContent = `✅ ${u.email}`; s.style.color = '#48bb78'; }
    else { s.textContent = '🔓 No autenticado'; s.style.color = '#c53030'; }
}

async function authenticate() {
    if (currentUser) return true;
    const email = prompt('🔐 Ingresa tu email para recibir el link de acceso:', AUTHORIZED_EMAIL);
    if (!email) return false;
    if (email.toLowerCase() !== AUTHORIZED_EMAIL.toLowerCase()) { alert('❌ Email no autorizado'); return false; }
    try {
        await sendSignInLinkToEmail(auth, email, { url: window.location.href, handleCodeInApp: true });
        window.localStorage.setItem('emailForSignIn', email);
        alert(`📧 Link enviado a ${email}\nRevisá tu bandeja (puede estar en spam).`);
    } catch (e) { alert('Error: ' + e.message); }
    return false;
}

window.handleSync = async function() {
    const btn = document.getElementById('syncBtn');
    if (!currentUser) { await authenticate(); return; }
    const orig = btn.textContent;
    btn.textContent = '⏳ Sincronizando...'; btn.disabled = true;
    try {
        const local = JSON.parse(localStorage.getItem('habitTrackerData_v3') || '{"habits":[],"completions":{},"counters":{},"notes":{}}');
        const snap = await get(ref(database, `users/${currentUser.uid}/data`));
        const cloud = snap.exists() ? snap.val() : { habits: [], completions: {}, counters: {}, notes: {} };
        const merged = {
            habits: local.habits.length > 0 ? local.habits : cloud.habits,
            completions: { ...cloud.completions, ...local.completions },
            counters: { ...cloud.counters, ...local.counters },
            notes: { ...cloud.notes, ...local.notes },
            version: 3,
            lastSynced: new Date().toISOString()
        };
        await set(ref(database, `users/${currentUser.uid}/data`), merged);
        localStorage.setItem('habitTrackerData_v3', JSON.stringify(merged));
        btn.textContent = '✅ Sincronizado';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; window.location.reload(); }, 1500);
    } catch (e) {
        btn.textContent = '❌ Error';
        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
        alert('Error: ' + e.message);
    }
};
</script>
